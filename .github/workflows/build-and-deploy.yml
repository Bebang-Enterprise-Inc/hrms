name: Build and Deploy Frappe HRMS

# Ensure only one deployment runs at a time - prevents race conditions
# when multiple PRs merge in quick succession
concurrency:
  group: frappe-production-deploy
  cancel-in-progress: false  # Queue subsequent runs, don't cancel them

on:
  push:
    branches:
      - production
    paths:
      - 'hrms/**'
      - '.github/helper/apps.json'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip image build (deploy existing image)'
        required: false
        default: 'false'
        type: boolean
      run_migrate:
        description: 'Run bench migrate after deploy'
        required: false
        default: 'true'
        type: boolean
      no_cache:
        description: 'Build without Docker cache (for code changes in apps)'
        required: false
        default: 'false'
        type: boolean

env:
  AWS_REGION: ap-southeast-1
  EC2_INSTANCE_ID: i-026b7477d27bd46d6
  DOCKER_IMAGE: samkarazi/bebang-erpnext-hrms
  DOCKER_TAG: v15
  FRAPPE_SITE: hrms.bebang.ph

jobs:
  guard:
    name: Guard Production Branch
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch for deployment
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref:   ${{ github.ref_name }}"
          if [ "${{ github.ref_name }}" != "production" ]; then
            echo "❌ Ref '${{ github.ref_name }}' is not allowed for this workflow."
            echo "   This workflow only deploys production and cannot run from feature branches."
            exit 1
          fi
          echo "✅ Branch guard passed."

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [guard]
    if: ${{ needs.guard.result == 'success' && github.event.inputs.skip_build != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Prepare apps.json
        run: |
          cp .github/helper/apps.json frappe_docker/apps.json
          echo "📦 Apps to be included:"
          cat frappe_docker/apps.json
          export APPS_JSON_BASE64=$(base64 -w 0 frappe_docker/apps.json)
          echo "APPS_JSON_BASE64=$APPS_JSON_BASE64" >> $GITHUB_ENV

      - name: Generate image tags
        id: tags
        run: |
          DATE_TAG=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=${GITHUB_SHA::7}
          echo "date_tag=$DATE_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📌 Tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}, ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-$DATE_TAG"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frappe_docker
          file: frappe_docker/images/custom/Containerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-${{ steps.tags.outputs.date_tag }}
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-${{ steps.tags.outputs.short_sha }}
          build-args: |
            FRAPPE_BRANCH=version-15
            PYTHON_VERSION=3.11.6
            NODE_VERSION=20.19.2
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
            CACHE_BUST=${{ github.sha }}
          # For push events, always disable cache (github.event_name == 'push')
          # For workflow_dispatch, respect the no_cache input
          no-cache: ${{ github.event_name == 'push' || github.event.inputs.no_cache == 'true' }}
          cache-from: ${{ github.event_name != 'push' && github.event.inputs.no_cache != 'true' && format('type=registry,ref={0}:{1}', env.DOCKER_IMAGE, env.DOCKER_TAG) || '' }}
          cache-to: type=inline

      - name: Output image info
        run: |
          echo "✅ Image built and pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
          echo "📦 Dated: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-${{ steps.tags.outputs.date_tag }}"

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [guard, build]
    if: always() && (needs.build.result == 'success' || github.event.inputs.skip_build == 'true')

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via Docker Swarm
        id: deploy
        run: |
          echo "🚀 Deploying to EC2 instance ${{ env.EC2_INSTANCE_ID }} via Docker Swarm..."

          # Rolling update all Frappe services with zero downtime
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "echo \"📥 Pulling latest image...\"",
              "docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}",
              "echo \"\"",
              "echo \"🚀 Starting rolling updates (zero-downtime)...\"",
              "docker service update --image ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} frappe_backend --with-registry-auth",
              "docker service update --image ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} frappe_frontend --with-registry-auth",
              "docker service update --image ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} frappe_websocket --with-registry-auth",
              "docker service update --image ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} frappe_queue-short --with-registry-auth",
              "docker service update --image ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} frappe_queue-long --with-registry-auth",
              "docker service update --image ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} frappe_scheduler --with-registry-auth",
              "echo \"\"",
              "echo \"⏳ Waiting for rolling update to complete...\"",
              "sleep 60",
              "echo \"\"",
              "echo \"📋 Service status:\"",
              "docker service ls",
              "echo \"\"",
              "echo \"✅ Deployment complete!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "📋 SSM Command ID: $COMMAND_ID"

          # Wait for command to complete (rolling updates take longer)
          echo "⏳ Waiting for rolling updates to complete..."
          sleep 90
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

          # Get command output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

      - name: Set Sentry DSN on services
        run: |
          echo "📊 Setting Sentry DSN environment variable on Frappe services..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "if [ -n \"${{ secrets.SENTRY_DSN }}\" ]; then",
              "  docker service update --env-rm SENTRY_DSN --env-add SENTRY_DSN=${{ secrets.SENTRY_DSN }} frappe_backend --detach",
              "  docker service update --env-rm SENTRY_DSN --env-add SENTRY_DSN=${{ secrets.SENTRY_DSN }} frappe_queue-short --detach",
              "  docker service update --env-rm SENTRY_DSN --env-add SENTRY_DSN=${{ secrets.SENTRY_DSN }} frappe_queue-long --detach",
              "  docker service update --env-rm SENTRY_DSN --env-add SENTRY_DSN=${{ secrets.SENTRY_DSN }} frappe_scheduler --detach",
              "  echo \"✅ Sentry DSN set on all backend services\"",
              "else",
              "  echo \"⚠️ SENTRY_DSN not set, skipping\"",
              "fi"
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Sentry DSN Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

      - name: Fix nginx site header
        run: |
          echo "🔧 Fixing nginx X-Frappe-Site-Name header..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "FRONTEND_CONTAINER=$(docker ps --filter name=frappe_frontend --format \"{{.Names}}\" | head -1)",
              "if [ -n \"$FRONTEND_CONTAINER\" ]; then",
              "  docker exec $FRONTEND_CONTAINER sed -i \"s/X-Frappe-Site-Name frontend/X-Frappe-Site-Name ${{ env.FRAPPE_SITE }}/g\" /etc/nginx/conf.d/frappe.conf",
              "  docker exec $FRONTEND_CONTAINER nginx -s reload",
              "  echo \"✅ Nginx site header fixed!\"",
              "else",
              "  echo \"⚠️ Frontend container not found, skipping nginx fix\"",
              "fi"
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Nginx Fix Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

      - name: Configure Blip webhook proxy
        run: |
          echo "🤖 Configuring nginx proxy for Blip webhook..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "FRONTEND_CONTAINER=$(docker ps --filter name=frappe_frontend --format \"{{.Names}}\" | head -1)",
              "if [ -z \"$FRONTEND_CONTAINER\" ]; then echo \"❌ Frontend container not found\"; exit 1; fi",
              "",
              "# Create Python script to inject Blip location block",
              "cat > /tmp/add_blip_nginx.py << PYEOF",
              "import re",
              "",
              "with open(\"/etc/nginx/conf.d/frappe.conf\", \"r\") as f:",
              "    content = f.read()",
              "",
              "blip_block = \"\"\"",
              "\\tlocation /webhook/gchat {",
              "\\t\\tproxy_http_version 1.1;",
              "\\t\\tproxy_set_header Host \\$host;",
              "\\t\\tproxy_set_header X-Real-IP \\$remote_addr;",
              "\\t\\tproxy_set_header X-Forwarded-For \\$proxy_add_x_forwarded_for;",
              "\\t\\tproxy_set_header X-Forwarded-Proto \\$scheme;",
              "\\t\\tproxy_pass http://172.17.0.1:8766/webhook/gchat;",
              "\\t}",
              "\"\"\"",
              "",
              "if \"location /webhook/gchat\" not in content:",
              "    content = content.replace(\"location /socket.io\", blip_block + \"\\n\\tlocation /socket.io\")",
              "    with open(\"/etc/nginx/conf.d/frappe.conf\", \"w\") as f:",
              "        f.write(content)",
              "    print(\"Added Blip location block\")",
              "else:",
              "    print(\"Blip location block already exists\")",
              "PYEOF",
              "",
              "# Copy and execute script in container",
              "docker cp /tmp/add_blip_nginx.py $FRONTEND_CONTAINER:/tmp/",
              "docker exec $FRONTEND_CONTAINER python3 /tmp/add_blip_nginx.py",
              "",
              "# Test and reload nginx",
              "docker exec $FRONTEND_CONTAINER nginx -t",
              "docker exec $FRONTEND_CONTAINER nginx -s reload",
              "echo \"✅ Blip webhook proxy configured!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Blip Config Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

      - name: Run migrations (if enabled)
        if: ${{ github.event.inputs.run_migrate != 'false' }}
        run: |
          echo "🔧 Running database migrations..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BACKEND_CONTAINER=$(docker ps --filter name=frappe_backend --format \"{{.Names}}\" | head -1)",
              "if [ -z \"$BACKEND_CONTAINER\" ]; then echo \"❌ Backend container not found\"; exit 1; fi",
              "echo \"Using container: $BACKEND_CONTAINER\"",
              "echo \"📦 Pinning setuptools<71 (fixes pkg_resources removal in 82.0)...\"",
              "docker exec $BACKEND_CONTAINER /home/frappe/frappe-bench/env/bin/pip install -q \"setuptools<71\"",
              "docker exec $BACKEND_CONTAINER bench --site ${{ env.FRAPPE_SITE }} migrate",
              "docker exec $BACKEND_CONTAINER bench --site ${{ env.FRAPPE_SITE }} clear-cache",
              "echo \"✅ Migration complete!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Migration Command ID: $COMMAND_ID"

          # Wait and get output
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

      - name: Sync assets to frontend container
        if: ${{ github.event.inputs.run_migrate != 'false' }}
        run: |
          echo "🔄 Syncing assets from backend to frontend (fixes CSS hash mismatch)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BACKEND_CONTAINER=$(docker ps --filter name=frappe_backend --format \"{{.Names}}\" | head -1)",
              "FRONTEND_CONTAINER=$(docker ps --filter name=frappe_frontend --format \"{{.Names}}\" | head -1)",
              "if [ -z \"$BACKEND_CONTAINER\" ] || [ -z \"$FRONTEND_CONTAINER\" ]; then echo \"❌ Container not found\"; exit 1; fi",
              "echo \"📦 Copying CSS and JS assets from $BACKEND_CONTAINER to $FRONTEND_CONTAINER...\"",
              "docker exec -T $BACKEND_CONTAINER tar czf - /home/frappe/frappe-bench/sites/assets/frappe/dist/css /home/frappe/frappe-bench/sites/assets/erpnext/dist/css /home/frappe/frappe-bench/sites/assets/hrms/dist/css /home/frappe/frappe-bench/sites/assets/assets.json 2>/dev/null | docker exec -T -i $FRONTEND_CONTAINER tar xzf - -C /",
              "echo \"✅ Assets synced successfully!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Asset Sync Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

      - name: Flush Redis cache
        run: |
          echo "🧹 Flushing Redis cache (prevents stale HTML with old asset hashes)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "echo \"Flushing Redis cache...\"",
              "docker exec $(docker ps --filter name=frappe_redis-cache --format \"{{.Names}}\" | head -1) redis-cli FLUSHALL",
              "echo \"Flushing Redis queue...\"",
              "docker exec $(docker ps --filter name=frappe_redis-queue --format \"{{.Names}}\" | head -1) redis-cli FLUSHALL || true",
              "echo \"✅ Redis flushed!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Redis Flush Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" || true

      - name: Verify deployment
        run: |
          echo "🔍 Verifying API is responding..."
          sleep 10

          # Test API endpoint (frappe.ping doesn't require auth)
          # Use public domain hq.bebang.ph (FRAPPE_SITE is internal folder name)
          RESPONSE=$(curl -s "https://hq.bebang.ph/api/method/frappe.ping" || echo "{}")

          if echo "$RESPONSE" | grep -q '"pong"'; then
            echo "✅ API is responding correctly"
            echo "$RESPONSE"
          else
            echo "⚠️ API may not be responding correctly"
            echo "Response: $RESPONSE"
          fi

      - name: Verify CSS assets loading
        run: |
          echo "🎨 Verifying CSS assets are loading correctly..."

          # Get a CSS file reference from the login page
          CSS_URL=$(curl -s https://hq.bebang.ph/login | grep -oP 'href="/assets/frappe/dist/css/[^"]+\.css"' | head -1 | tr -d '"' | sed 's/href=//')

          if [ -n "$CSS_URL" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://hq.bebang.ph$CSS_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ CSS loading correctly: $CSS_URL"
            else
              echo "❌ CSS 404 error: $CSS_URL returned $HTTP_CODE"
              echo "⚠️ This may indicate stale assets. Consider re-running deployment."
              exit 1
            fi
          else
            echo "⚠️ Could not find CSS reference in page (may be OK for API-only changes)"
          fi

          # Verify JS assets as well
          JS_URL=$(curl -s https://hq.bebang.ph/login | grep -oP 'src="/assets/frappe/dist/js/[^"]+\.js"' | head -1 | tr -d '"' | sed 's/src=//')
          if [ -n "$JS_URL" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://hq.bebang.ph$JS_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ JS loading correctly: $JS_URL"
            else
              echo "⚠️ JS returned $HTTP_CODE: $JS_URL"
            fi
          fi

  cleanup:
    name: Archive old images & cleanup
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Archive and cleanup old images
        run: |
          echo "🧹 Starting image cleanup (keep latest 4 builds)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "echo \"🗑️ Removing exited containers...\"",
              "docker container prune -f",
              "",
              "echo \"📋 Current images:\"",
              "docker images ${{ env.DOCKER_IMAGE }} --format \"{{.Tag}} {{.ID}} {{.CreatedAt}}\" | sort -r",
              "",
              "echo \"\"",
              "echo \"🔍 Finding images to remove (keeping latest 4 builds)...\"",
              "",
              "# Get all image IDs sorted by creation date, skip first 4",
              "OLD_IMAGES=$(docker images ${{ env.DOCKER_IMAGE }} --format \"{{.ID}}\" | tail -n +5)",
              "",
              "if [ -n \"$OLD_IMAGES\" ]; then",
              "  echo \"📦 Removing old images: $OLD_IMAGES\"",
              "  docker rmi $OLD_IMAGES 2>/dev/null || true",
              "else",
              "  echo \"✅ No old images to remove (4 or fewer exist)\"",
              "fi",
              "",
              "# Also clean up dated tags older than 4 builds",
              "OLD_TAGS=$(docker images ${{ env.DOCKER_IMAGE }} --format \"{{.Tag}}\" | grep -E \"^v15-[0-9]{8}\" | sort -r | tail -n +5)",
              "",
              "if [ -z \"$OLD_TAGS\" ]; then",
              "  echo \"✅ No old dated tags to clean up\"",
              "else",
              "  echo \"📦 Removing old dated tags: $OLD_TAGS\"",
              "  for TAG in $OLD_TAGS; do",
              "    docker rmi ${{ env.DOCKER_IMAGE }}:$TAG 2>/dev/null || true",
              "  done",
              "fi",
              "",
              "echo \"\"",
              "echo \"🧹 Removing dangling images...\"",
              "docker image prune -f",
              "",
              "echo \"\"",
              "echo \"📋 Final image list:\"",
              "docker images ${{ env.DOCKER_IMAGE }} --format \"{{.Tag}} {{.Size}}\"",
              "",
              "echo \"\"",
              "echo \"💾 Disk usage after cleanup:\"",
              "df -h / | tail -1"
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Cleanup Command ID: $COMMAND_ID"

          # Wait for completion (can take a while for large images)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --waiter-delay 30 \
            --waiter-max-attempts 20 || true

          # Get output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

  notify:
    name: Notify on completion
    runs-on: ubuntu-latest
    needs: [build, deploy, cleanup]
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to ${{ env.FRAPPE_SITE }} succeeded!"
            if [ "${{ needs.cleanup.result }}" == "success" ]; then
              echo "🧹 Old images archived to S3 and cleaned up"
            fi
          else
            echo "❌ Deployment failed. Check logs above."
          fi
