name: Build and Deploy Frappe HRMS

on:
  push:
    branches:
      - production
    paths:
      - 'hrms/**'
      - '.github/docker/Containerfile.fast'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip image build (deploy existing image)'
        required: false
        default: 'false'
        type: boolean
      run_migrate:
        description: 'Run bench migrate after deploy'
        required: false
        default: 'true'
        type: boolean
      no_cache:
        description: 'Build without Docker cache (for code changes in apps)'
        required: false
        default: 'false'
        type: boolean

env:
  AWS_REGION: ap-southeast-1
  EC2_INSTANCE_ID: i-026b7477d27bd46d6
  DOCKER_IMAGE: ghcr.io/bebang-enterprise-inc/bebang-erpnext-hrms
  DOCKERHUB_BASE: samkarazi/bebang-erpnext-hrms:v15
  DOCKER_TAG: v15
  FRAPPE_SITE: hrms.bebang.ph
  SUPABASE_URL: https://csnniykjrychgajfrgua.supabase.co

jobs:
  guard:
    name: Guard Production Branch
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch for deployment
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref:   ${{ github.ref_name }}"
          if [ "${{ github.ref_name }}" != "production" ]; then
            echo "❌ Ref '${{ github.ref_name }}' is not allowed for this workflow."
            echo "   This workflow only deploys production and cannot run from feature branches."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_build }}" = "true" ]; then
            echo "❌ skip_build=true is blocked."
            echo "   Production deployments must build from current production source."
            exit 1
          fi
          echo "✅ Branch guard passed."

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [guard]
    if: ${{ needs.guard.result == 'success' && github.event.inputs.skip_build != 'true' }}
    concurrency:
      group: frappe-build
      cancel-in-progress: true
    permissions:
      packages: write
    outputs:
      image_digest: ${{ steps.build_push.outputs.digest }}
      image_short_sha: ${{ steps.tags.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (base image pull)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR (push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📌 Tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}, ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-$SHORT_SHA"

      - name: Build and push
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Containerfile.fast
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-${{ steps.tags.outputs.short_sha }}
          build-args: |
            BASE_IMAGE=${{ env.DOCKERHUB_BASE }}
            HRMS_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,image-manifest=true,oci-mediatypes=true,compression=zstd,mode=max
          outputs: type=registry,compression=zstd,compression-level=3

      - name: Output image info
        run: |
          echo "✅ Image built and pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
          echo "📦 SHA tag: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-${{ steps.tags.outputs.short_sha }}"
          echo "🔐 Digest: ${{ steps.build_push.outputs.digest }}"

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [guard, build]
    environment: production-deploy
    if: ${{ needs.guard.result == 'success' && needs.build.result == 'success' }}
    concurrency:
      group: frappe-deploy
      cancel-in-progress: false
    permissions:
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via Docker Swarm
        id: deploy
        run: |
          set -euo pipefail
          DEPLOY_IMAGE="${{ env.DOCKER_IMAGE }}@${{ needs.build.outputs.image_digest }}"
          IMAGE_TAG="${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}-${{ needs.build.outputs.image_short_sha }}"

          echo "🚀 Deploying to EC2 instance ${{ env.EC2_INSTANCE_ID }} via Docker Swarm..."
          echo "📦 Immutable image tag: $IMAGE_TAG"
          echo "📦 Digest deploy image: $DEPLOY_IMAGE"
          echo "🔐 Expected digest: ${{ needs.build.outputs.image_digest }}"

          # Build the deploy script, base64 encode it to avoid JSON escaping issues
          DEPLOY_SCRIPT=$(cat <<'SCRIPT_EOF'
          set -e
          DEPLOY_IMAGE="__DEPLOY_IMAGE__"
          EXPECTED_DIGEST="__EXPECTED_DIGEST__"
          SENTRY_DSN="__SENTRY_DSN__"
          SUPABASE_URL="__SUPABASE_URL__"
          SUPABASE_KEY="__SUPABASE_KEY__"
          SUPABASE_MGMT_TOKEN="__SUPABASE_MGMT_TOKEN__"
          MIN_FREE_KB=6291456

          echo "💾 Root disk before deploy:"
          df -h /
          AVAILABLE_KB=$(df --output=avail / | tail -1 | tr -d " ")
          if [ "$AVAILABLE_KB" -lt "$MIN_FREE_KB" ]; then
            echo "🧹 Low disk detected, pruning unused Docker artifacts..."
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            echo "💾 Root disk after cleanup:"
            df -h /
            AVAILABLE_KB=$(df --output=avail / | tail -1 | tr -d " ")
          fi
          if [ "$AVAILABLE_KB" -lt "$MIN_FREE_KB" ]; then
            echo "❌ Not enough free disk for image pull: ${AVAILABLE_KB}KB available"
            exit 1
          fi

          echo ""
          echo "🔑 Authenticating to GHCR..."
          echo "__GHCR_TOKEN__" | docker login ghcr.io -u __GHCR_USER__ --password-stdin

          echo ""
          echo "📥 Pulling immutable image: $DEPLOY_IMAGE"
          docker pull $DEPLOY_IMAGE

          echo ""
          echo "🚀 Starting rolling updates..."

          # Backend services: image + env vars (parallel detach, then converge)
          BACKEND_SERVICES="frappe_backend frappe_queue-short frappe_queue-long frappe_scheduler"
          for SVC in $BACKEND_SERVICES; do
            ENV_ARGS=""
            if [ -n "$SENTRY_DSN" ]; then
              ENV_ARGS="$ENV_ARGS --env-rm SENTRY_DSN --env-add SENTRY_DSN=$SENTRY_DSN"
            fi
            if [ -n "$SUPABASE_URL" ]; then
              ENV_ARGS="$ENV_ARGS --env-rm SUPABASE_URL --env-rm SUPABASE_SERVICE_ROLE_KEY"
              ENV_ARGS="$ENV_ARGS --env-add SUPABASE_URL=$SUPABASE_URL --env-add SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_KEY"
            fi
            if [ -n "$SUPABASE_MGMT_TOKEN" ]; then
              ENV_ARGS="$ENV_ARGS --env-rm SUPABASE_MGMT_TOKEN"
              ENV_ARGS="$ENV_ARGS --env-add SUPABASE_MGMT_TOKEN=$SUPABASE_MGMT_TOKEN"
            fi
            docker service update --detach=true --update-failure-action=rollback --image $DEPLOY_IMAGE $ENV_ARGS $SVC
            echo "  ↳ $SVC update dispatched"
          done

          # Frontend/websocket: image only (parallel detach)
          for SVC in frappe_frontend frappe_websocket; do
            docker service update --detach=true --update-failure-action=rollback --image $DEPLOY_IMAGE $SVC
            echo "  ↳ $SVC update dispatched"
          done

          echo ""
          echo "⏳ Waiting for all services to converge..."
          ALL_SERVICES="frappe_backend frappe_queue-short frappe_queue-long frappe_scheduler frappe_frontend frappe_websocket"
          for SVC in $ALL_SERVICES; do
            docker service update --detach=false $SVC
            echo "  ✅ $SVC converged"
          done

          echo ""
          echo "📋 Service status:"
          docker service ls

          echo ""
          echo "🔎 Verifying backend service digest..."
          ACTUAL_IMAGE=$(docker service inspect frappe_backend --format "{{.Spec.TaskTemplate.ContainerSpec.Image}}")
          echo "Backend service image: $ACTUAL_IMAGE"
          case "$ACTUAL_IMAGE" in
            *"$EXPECTED_DIGEST"*) echo "✅ Backend service digest matches expected build" ;;
            *) echo "❌ Backend service digest mismatch"; exit 1 ;;
          esac

          echo ""
          echo "✅ Deployment complete!"
          SCRIPT_EOF
          )

          # Substitute variables into script
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__DEPLOY_IMAGE__/$DEPLOY_IMAGE}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__EXPECTED_DIGEST__/${{ needs.build.outputs.image_digest }}}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__SENTRY_DSN__/${{ secrets.SENTRY_DSN }}}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__SUPABASE_URL__/${{ env.SUPABASE_URL }}}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__SUPABASE_KEY__/${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__SUPABASE_MGMT_TOKEN__/${{ secrets.SUPABASE_MGMT_TOKEN }}}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__GHCR_TOKEN__/${{ secrets.GITHUB_TOKEN }}}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__GHCR_USER__/${{ github.actor }}}"

          # Base64 encode the script for SSM transport
          ENCODED_SCRIPT=$(echo "$DEPLOY_SCRIPT" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo $ENCODED_SCRIPT | base64 -d | bash\"]" \
            --output text \
            --query 'Command.CommandId')

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "📋 SSM Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "deploy command" \
            15 \
            80

      - name: Fix nginx site header
        run: |
          set -euo pipefail
          echo "🔧 Fixing nginx X-Frappe-Site-Name header..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "FRONTEND_CONTAINER=$(docker ps --filter name=frappe_frontend --format \"{{.Names}}\" | head -1)",
              "if [ -n \"$FRONTEND_CONTAINER\" ]; then",
              "  docker exec $FRONTEND_CONTAINER sed -i \"s/X-Frappe-Site-Name frontend/X-Frappe-Site-Name ${{ env.FRAPPE_SITE }}/g\" /etc/nginx/conf.d/frappe.conf",
              "  docker exec $FRONTEND_CONTAINER nginx -s reload",
              "  echo \"✅ Nginx site header fixed!\"",
              "else",
              "  echo \"❌ Frontend container not found\"",
              "  exit 1",
              "fi"
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Nginx Fix Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "fix nginx site header" \
            10 \
            40

      - name: Configure Blip webhook proxy
        run: |
          set -euo pipefail
          echo "🤖 Configuring nginx proxy for Blip webhook..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "FRONTEND_CONTAINER=$(docker ps --filter name=frappe_frontend --format \"{{.Names}}\" | head -1)",
              "if [ -z \"$FRONTEND_CONTAINER\" ]; then echo \"❌ Frontend container not found\"; exit 1; fi",
              "",
              "# Create Python script to inject Blip location block",
              "cat > /tmp/add_blip_nginx.py << PYEOF",
              "import re",
              "",
              "with open(\"/etc/nginx/conf.d/frappe.conf\", \"r\") as f:",
              "    content = f.read()",
              "",
              "blip_block = \"\"\"",
              "\\tlocation /webhook/gchat {",
              "\\t\\tproxy_http_version 1.1;",
              "\\t\\tproxy_set_header Host \\$host;",
              "\\t\\tproxy_set_header X-Real-IP \\$remote_addr;",
              "\\t\\tproxy_set_header X-Forwarded-For \\$proxy_add_x_forwarded_for;",
              "\\t\\tproxy_set_header X-Forwarded-Proto \\$scheme;",
              "\\t\\tproxy_pass http://172.17.0.1:8766/webhook/gchat;",
              "\\t}",
              "\"\"\"",
              "",
              "if \"location /webhook/gchat\" not in content:",
              "    content = content.replace(\"location /socket.io\", blip_block + \"\\n\\tlocation /socket.io\")",
              "    with open(\"/etc/nginx/conf.d/frappe.conf\", \"w\") as f:",
              "        f.write(content)",
              "    print(\"Added Blip location block\")",
              "else:",
              "    print(\"Blip location block already exists\")",
              "PYEOF",
              "",
              "# Copy and execute script in container",
              "docker cp /tmp/add_blip_nginx.py $FRONTEND_CONTAINER:/tmp/",
              "docker exec $FRONTEND_CONTAINER python3 /tmp/add_blip_nginx.py",
              "",
              "# Test and reload nginx",
              "docker exec $FRONTEND_CONTAINER nginx -t",
              "docker exec $FRONTEND_CONTAINER nginx -s reload",
              "echo \"✅ Blip webhook proxy configured!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Blip Config Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "configure blip webhook proxy" \
            10 \
            40

      - name: Run migrations (if enabled)
        if: ${{ github.event.inputs.run_migrate != 'false' }}
        run: |
          set -euo pipefail
          echo "🔧 Running database migrations..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BACKEND_CONTAINER=$(docker ps --filter name=frappe_backend --format \"{{.Names}}\" | head -1)",
              "if [ -z \"$BACKEND_CONTAINER\" ]; then echo \"❌ Backend container not found\"; exit 1; fi",
              "echo \"Using container: $BACKEND_CONTAINER\"",
              "echo \"📦 Pinning setuptools<71 (fixes pkg_resources removal in 82.0)...\"",
              "docker exec $BACKEND_CONTAINER /home/frappe/frappe-bench/env/bin/pip install -q \"setuptools<71\"",
              "docker exec $BACKEND_CONTAINER bench --site ${{ env.FRAPPE_SITE }} migrate",
              "docker exec $BACKEND_CONTAINER bench --site ${{ env.FRAPPE_SITE }} clear-cache",
              "echo \"✅ Migration complete!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Migration Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "run migrations" \
            15 \
            80

      - name: Sync assets to frontend container
        if: ${{ github.event.inputs.run_migrate != 'false' }}
        run: |
          set -euo pipefail
          echo "🔄 Syncing assets from backend to frontend (fixes CSS hash mismatch)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BACKEND_CONTAINER=$(docker ps --filter name=frappe_backend --format \"{{.Names}}\" | head -1)",
              "FRONTEND_CONTAINER=$(docker ps --filter name=frappe_frontend --format \"{{.Names}}\" | head -1)",
              "if [ -z \"$BACKEND_CONTAINER\" ] || [ -z \"$FRONTEND_CONTAINER\" ]; then echo \"❌ Container not found\"; exit 1; fi",
              "echo \"📦 Copying asset bundles from $BACKEND_CONTAINER to $FRONTEND_CONTAINER...\"",
              "TMP_ASSET_TAR=/tmp/frappe-assets-sync.tar.gz",
              "rm -f \"$TMP_ASSET_TAR\"",
              "docker exec \"$BACKEND_CONTAINER\" sh -lc \"cd /home/frappe/frappe-bench/sites/assets && tar czf - frappe erpnext hrms assets.json\" > \"$TMP_ASSET_TAR\"",
              "if [ ! -s \"$TMP_ASSET_TAR\" ]; then echo \"❌ Asset archive is empty\"; exit 1; fi",
              "docker exec -i \"$FRONTEND_CONTAINER\" sh -lc \"cd /home/frappe/frappe-bench/sites/assets && tar xzf -\" < \"$TMP_ASSET_TAR\"",
              "rm -f \"$TMP_ASSET_TAR\"",
              "echo \"✅ Assets synced successfully!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Asset Sync Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "sync assets to frontend" \
            10 \
            40

      - name: Flush Redis cache
        run: |
          set -euo pipefail
          echo "🧹 Flushing Redis cache (prevents stale HTML with old asset hashes)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "echo \"Flushing Redis cache...\"",
              "docker exec $(docker ps --filter name=frappe_redis-cache --format \"{{.Names}}\" | head -1) redis-cli FLUSHALL",
              "echo \"Flushing Redis queue...\"",
              "docker exec $(docker ps --filter name=frappe_redis-queue --format \"{{.Names}}\" | head -1) redis-cli FLUSHALL",
              "echo \"✅ Redis flushed!\""
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Redis Flush Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "flush redis cache" \
            10 \
            40

      - name: Verify deployment
        run: |
          set -euo pipefail
          echo "🔍 Verifying API is responding..."
          ATTEMPT=1
          MAX_ATTEMPTS=24

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            RESPONSE=$(curl -fsS "https://hq.bebang.ph/api/method/frappe.ping" || true)
            if echo "$RESPONSE" | grep -q '"pong"'; then
              echo "✅ API is responding correctly"
              echo "$RESPONSE"
              exit 0
            fi

            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: frappe.ping not ready yet"
            sleep 5
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "❌ API did not return pong after deployment" >&2
          exit 1

      - name: Verify login page assets loading
        run: |
          set -euo pipefail
          echo "🎨 Verifying login page assets are loading correctly..."

          LOGIN_HTML=$(curl -fsSL https://hq.bebang.ph/login)
          ASSET_URLS=$(printf '%s' "$LOGIN_HTML" | grep -oE '/assets/[^" )>]+' | sort -u || true)

          if [ -z "$ASSET_URLS" ]; then
            echo "❌ Could not find any /assets/ references in login page" >&2
            exit 1
          fi

          echo "$ASSET_URLS" | head -10 | while IFS= read -r asset_url; do
            [ -n "$asset_url" ] || continue
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://hq.bebang.ph$asset_url")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Asset loading correctly: $asset_url"
            else
              echo "❌ Asset returned $HTTP_CODE: $asset_url" >&2
              exit 1
            fi
          done

  cleanup:
    name: Archive old images & cleanup
    runs-on: ubuntu-latest
    needs: [deploy]
    environment: production-deploy
    if: needs.deploy.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Archive and cleanup old images
        run: |
          set -euo pipefail
          echo "🧹 Starting image cleanup (keep latest 4 builds)..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "echo \"🗑️ Removing exited containers...\"",
              "docker container prune -f",
              "",
              "echo \"📋 Current GHCR images:\"",
              "docker images ghcr.io/bebang-enterprise-inc/bebang-erpnext-hrms --format \"{{.Tag}} {{.ID}} {{.CreatedAt}}\" | sort -r",
              "",
              "echo \"📋 Current Docker Hub images:\"",
              "docker images samkarazi/bebang-erpnext-hrms --format \"{{.Tag}} {{.ID}} {{.CreatedAt}}\" | sort -r",
              "",
              "echo \"\"",
              "echo \"🔍 Finding GHCR images to remove (keeping latest 4 builds)...\"",
              "",
              "# Get all GHCR image IDs sorted by creation date, skip first 4",
              "OLD_IMAGES=$(docker images ghcr.io/bebang-enterprise-inc/bebang-erpnext-hrms --format \"{{.ID}}\" | tail -n +5)",
              "",
              "if [ -n \"$OLD_IMAGES\" ]; then",
              "  echo \"📦 Removing old GHCR images: $OLD_IMAGES\"",
              "  docker rmi $OLD_IMAGES 2>/dev/null || true",
              "else",
              "  echo \"✅ No old GHCR images to remove (4 or fewer exist)\"",
              "fi",
              "",
              "# Clean up old Docker Hub images (legacy, keep only base v15 tag)",
              "OLD_HUB_IMAGES=$(docker images samkarazi/bebang-erpnext-hrms --format \"{{.Tag}} {{.ID}}\" | grep -v \"^v15 \" | awk \"{print \\$2}\")",
              "if [ -n \"$OLD_HUB_IMAGES\" ]; then",
              "  echo \"📦 Removing old Docker Hub images (keeping base v15): $OLD_HUB_IMAGES\"",
              "  docker rmi $OLD_HUB_IMAGES 2>/dev/null || true",
              "fi",
              "",
              "echo \"\"",
              "echo \"🧹 Removing dangling images...\"",
              "docker image prune -f",
              "",
              "echo \"\"",
              "echo \"📋 Final image list:\"",
              "docker images --format \"{{.Repository}}:{{.Tag}} {{.Size}}\" | grep -E \"(ghcr.io/bebang|samkarazi/bebang)\"",
              "",
              "echo \"\"",
              "echo \"💾 Disk usage after cleanup:\"",
              "df -h / | tail -1"
            ]' \
            --output text \
            --query 'Command.CommandId')

          echo "📋 Cleanup Command ID: $COMMAND_ID"

          bash .github/helper/ssm_wait_and_assert.sh \
            "$COMMAND_ID" \
            "${{ env.EC2_INSTANCE_ID }}" \
            "cleanup old images" \
            30 \
            20

  notify:
    name: Notify on completion
    runs-on: ubuntu-latest
    needs: [build, deploy, cleanup]
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to ${{ env.FRAPPE_SITE }} succeeded!"
            if [ "${{ needs.cleanup.result }}" == "success" ]; then
              echo "🧹 Old images archived to S3 and cleaned up"
            fi
          else
            echo "❌ Deployment failed. Check logs above."
          fi
