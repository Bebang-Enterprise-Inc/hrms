name: Daily POS & Web Orders Sync

on:
  schedule:
    # 12:30 AM PHT = 16:30 UTC (previous day) - overnight sync
    - cron: "30 16 * * *"
    # 4:00 PM PHT = 08:00 UTC - afternoon intraday sync
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Override sync date (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        type: string
      skip_anomaly:
        description: "Skip anomaly detection step"
        required: false
        type: boolean
        default: false

env:
  SUPABASE_URL: "https://csnniykjrychgajfrgua.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_MGMT_TOKEN: ${{ secrets.SUPABASE_MGMT_TOKEN }}
  SUPERADMIN_API_KEY: ${{ secrets.SUPERADMIN_API_KEY }}

jobs:
  # ── Step 1: POS orders from Mosaic API (with retry) ────────────────────────
  pos-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 attempts x 60 min max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Setup Mosaic credentials
        run: |
          mkdir -p data/POS_Extraction
          echo "${{ secrets.MOSAIC_CREDS_CSV }}" | base64 -d > data/POS_Extraction/MOSAIC_POS_API_KEYS.csv

      - name: Run POS sync with retry
        run: |
          MAX_ATTEMPTS=3
          RETRY_DELAY=1800  # 30 minutes

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== POS sync attempt $attempt/$MAX_ATTEMPTS ==="

            if [ -n "${{ inputs.target_date }}" ]; then
              python scripts/sync_pos_to_supabase.py \
                --from "${{ inputs.target_date }}" \
                --to "${{ inputs.target_date }}" \
                --parallel --refresh-views && exit 0
            else
              python scripts/sync_pos_to_supabase.py \
                --daily --parallel --refresh-views && exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done

          echo "All $MAX_ATTEMPTS attempts failed."
          exit 1

  # ── Step 2: Web orders from Superadmin API (parallel with POS) ─────────────
  web-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Setup data files
        run: |
          mkdir -p data/POS_Extraction
          echo "${{ secrets.MOSAIC_TENANTS_JSON }}" | base64 -d > data/POS_Extraction/mosaic_tenants.json

      - name: Run web orders sync
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            python scripts/sync_web_to_supabase.py \
              --start-date "${{ inputs.target_date }}" \
              --end-date "${{ inputs.target_date }}"
          else
            python scripts/sync_web_to_supabase.py --rolling-days 7
          fi

  # ── FoodPanda sync jobs REMOVED (2026-04-05) ──────────────────────────────
  # FoodPanda and GrabFood orders now flow through Mosaic POS (since Mar 25).
  # The Google Sheets sync was obsolete and failing with TimeoutError.
  # Historical data retained in foodpanda_orders table.
  # Scripts retained in scripts/ for reference.

  # ── Step 3: Refresh dashboard materialized views after all sales feeds ────
  refresh-sales-dashboard-views:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pos-sync, web-sync]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Refresh sales dashboard materialized views
        run: |
          python scripts/supabase_exec.py "select public.refresh_sales_dashboard_daily_store_metrics();"

  # ── Step 4: Anomaly detection (AFTER all syncs complete) ─────────────────
  anomaly-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [refresh-sales-dashboard-views]
    if: ${{ !inputs.skip_anomaly }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-auth google-api-python-client

      - name: Setup Google credentials
        run: |
          mkdir -p credentials
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" | base64 -d > credentials/task-manager-service.json

      - name: Run anomaly detection (log to DB only, 9 AM report sends Chat)
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            python scripts/detect_anomalies.py --date "${{ inputs.target_date }}" --no-chat
          else
            python scripts/detect_anomalies.py --no-chat
          fi

  # ── Workflow-level failure notification ─────────────────────────────────────
  notify-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [pos-sync, web-sync, refresh-sales-dashboard-views, anomaly-detection]
    if: ${{ always() && contains(needs.*.result, 'failure') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Setup Google credentials
        run: |
          mkdir -p credentials
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" | base64 -d > credentials/task-manager-service.json

      - name: Send failure alert to Google Chat
        run: |
          python -c "
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          creds = service_account.Credentials.from_service_account_file(
              'credentials/task-manager-service.json',
              scopes=['https://www.googleapis.com/auth/chat.bot'],
          )
          chat = build('chat', 'v1', credentials=creds)

          pos = '${{ needs.pos-sync.result }}'
          web = '${{ needs.web-sync.result }}'
          views = '${{ needs.refresh-sales-dashboard-views.result }}'
          anomaly = '${{ needs.anomaly-detection.result }}'

          severity = 'CRITICAL' if pos == 'failure' else 'WARNING'
          icon = chr(0x1F534) if severity == 'CRITICAL' else chr(0x1F7E1)

          def fmt(name, result):
              icons = {'success': chr(0x2705), 'failure': chr(0x274C), 'skipped': chr(0x23ED), 'cancelled': chr(0x1F6AB)}
              return f'{icons.get(result, chr(0x2753))} {name}: {result}'

          lines = [
              f'{icon} {severity}: Daily Sales Sync',
              '',
              fmt('POS sync (revenue)', pos),
              fmt('Web sync (delivery)', web),
              fmt('View refresh', views),
              fmt('Anomaly detection', anomaly),
              '',
              f'Re-run: https://github.com/${{ github.repository }}/actions/workflows/daily-pos-sync.yml',
              f'Details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
          ]
          msg = chr(10).join(lines)
          chat.spaces().messages().create(
              parent='spaces/AAQABiNmpBg',
              body={'text': msg},
          ).execute()
          print('Failure alert sent to Google Chat')
          "
