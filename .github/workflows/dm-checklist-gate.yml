name: Frappe DM Checklist Gate

on:
  pull_request:
    paths:
      - 'hrms/**/*.py'
      - 'hrms/**/*.json'

jobs:
  dm-checklist:
    name: Check for GL/Payment Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          cat changed_files.txt

      - name: Detect GL/Payment patterns
        id: detect
        run: |
          PATTERNS="Journal.Entry|Payment.Entry|journal_entry|payment_entry|JV|GL.Entry|frappe.db.savepoint|EWT|VAT|party_type|advance_payment|billing"       

          # Only scan changed .py files
          CHANGED_PY=$(grep '\.py$' changed_files.txt || true)

          if [ -z "$CHANGED_PY" ]; then
            echo "gl_detected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          FOUND=false
          for f in $CHANGED_PY; do
            if [ -f "$f" ]; then
              if grep -qE "$PATTERNS" "$f"; then
                FOUND=true
                echo "GL/payment pattern found in: $f"
              fi
            fi
          done

          echo "gl_detected=$FOUND" >> $GITHUB_OUTPUT

      - name: Post DM Checklist reminder (if GL patterns found)
        if: steps.detect.outputs.gl_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ⚠️ Frappe Deadly Mistakes (DM) Checklist Required

            This PR modifies GL/payment-related code. Before merging, confirm each item:

            - [ ] **DM-1:** All GL entries on receivable/payable accounts have `party_type` + `party` fields
            - [ ] **DM-2:** Any function touching 2+ docs uses `frappe.db.savepoint()` for atomicity
            - [ ] **DM-3:** EWT (1%/2%/5%) and VAT (12%) treatment is documented in the PR description
            - [ ] **DM-4:** All reference fields use `Link` type, not `Data`
            - [ ] **DM-5:** Computed values are fetched in `validate()`, not stored from frontend input
            - [ ] **DM-6:** Reclassification JVs include `user_remark`, `party_type`+`party` on both rows, and `reference_type`+`reference_name`    

            **Source:** `.claude/rules/frappe-development.md`

            _This comment is auto-generated. A reviewer must check all boxes before merging._`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if GL patterns found (manual confirmation required)
        if: steps.detect.outputs.gl_detected == 'true'
        run: |
          echo "GL/payment patterns detected. DM Checklist comment posted on PR."
          echo "A reviewer must manually confirm all DM items before merging." 
          echo "This check itself does NOT fail the build — it's an advisory reminder."
          echo "If you want to make this blocking, change 'exit 0' to 'exit 1' here."
          exit 0