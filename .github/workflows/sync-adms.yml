name: ADMS Attendance Sync (every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      from_date:
        description: "Start date YYYY-MM-DD (for backfill)"
        required: false
        type: string
      to_date:
        description: "End date YYYY-MM-DD (for backfill)"
        required: false
        type: string
      store:
        description: "Filter by store name (e.g., 'LCT')"
        required: false
        type: string
      dry_run:
        description: "Dry run (show what would sync)"
        required: false
        type: boolean
        default: false

env:
  SUPABASE_URL: "https://csnniykjrychgajfrgua.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: "ap-southeast-1"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 httpx

      - name: Run ADMS sync
        run: |
          if [ -n "${{ inputs.from_date }}" ]; then
            # Backfill mode (manual trigger)
            ARGS="--backfill --from ${{ inputs.from_date }}"
            if [ -n "${{ inputs.to_date }}" ]; then
              ARGS="$ARGS --to ${{ inputs.to_date }}"
            fi
            if [ -n "${{ inputs.store }}" ]; then
              ARGS="$ARGS --store '${{ inputs.store }}'"
            fi
          else
            # Incremental mode (scheduled)
            ARGS="--incremental"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: python scripts/sync_adms_to_supabase.py $ARGS"
          eval python scripts/sync_adms_to_supabase.py $ARGS

  # Failure notification — standalone (no frappe deps)
  notify-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [sync]
    if: ${{ failure() }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Setup Google credentials
        run: |
          mkdir -p credentials
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" | base64 -d > credentials/task-manager-service.json

      - name: Send failure alert to Google Chat
        run: |
          python -c "
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          creds = service_account.Credentials.from_service_account_file(
              'credentials/task-manager-service.json',
              scopes=['https://www.googleapis.com/auth/chat.bot'],
          )
          chat = build('chat', 'v1', credentials=creds)

          msg = (
              'SYNC FAILURE: Hourly ADMS Attendance Sync\n\n'
              'The ADMS → Supabase sync job failed.\n'
              'Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          )
          chat.spaces().messages().create(
              parent='spaces/AAQA3NVVR6c',
              body={'text': msg},
          ).execute()
          print('Failure alert sent to Google Chat')
          "
