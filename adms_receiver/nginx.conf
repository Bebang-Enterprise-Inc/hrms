worker_processes  1;

events { worker_connections 1024; }

http {
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Simple per-IP rate limiting (tune during pilot)
  limit_req_zone $binary_remote_addr zone=adms_limit:10m rate=10r/s;

  # Docker embedded DNS (required when proxy_pass uses a hostname in a variable)
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 8080;

    location / {
      limit_req zone=adms_limit burst=20 nodelay;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;

      set $adms_upstream http://adms-api:8008;
      proxy_pass $adms_upstream;
    }
  }
}
