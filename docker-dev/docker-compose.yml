# Local Frappe Development Environment
# Controlled entirely via CLI - no GUI required
#
# Usage:
#   Start:    docker compose up -d
#   Stop:     docker compose down
#   Logs:     docker compose logs -f frappe
#   Shell:    docker exec -it frappe-dev bash
#   Bench:    docker exec -it frappe-dev bench <command>
#   Test API: docker exec -it frappe-dev bench execute hrms.api.employee_clearance.get_exit_interview_questions
#
# Development:
#   - Edit files in hrms/api/ locally - changes sync to container automatically
#   - Run `docker exec -it frappe-dev bench --site dev.localhost clear-cache` after changes
#   - Or restart: docker compose restart frappe
#
# First Run:
#   The first startup takes 10-15 minutes to initialize bench and install apps.
#   Subsequent starts are fast (~30 seconds) because frappe-bench is persisted.
#
# Reset:
#   To start fresh: docker compose down -v && docker compose up -d

services:
  frappe:
    container_name: frappe-dev
    image: frappe/bench:v5.25.11
    command: >
      bash -c "
        cd /home/frappe/frappe-bench

        if [ ! -f sites/dev.localhost/site_config.json ]; then
          echo '>>> First run - initializing bench...'

          # Initialize if Procfile doesn't exist (fresh volume)
          if [ ! -f Procfile ]; then
            cd /home/frappe
            bench init --ignore-exist --skip-redis-config-generation --frappe-branch version-15 frappe-bench
            cd /home/frappe/frappe-bench
          fi

          bench set-config -g db_host mariadb
          bench set-config -g redis_cache redis://redis-cache:6379
          bench set-config -g redis_queue redis://redis-queue:6379
          bench set-config -g redis_socketio redis://redis-queue:6379

          # Install ERPNext, Payments, and upstream HRMS v15
          bench get-app --branch version-15 https://github.com/frappe/erpnext
          bench get-app --branch version-15 https://github.com/frappe/payments
          bench get-app --branch version-15 https://github.com/frappe/hrms

          # Create site and install apps
          bench new-site dev.localhost --mariadb-root-password admin --admin-password admin --no-mariadb-socket
          bench --site dev.localhost install-app erpnext
          bench --site dev.localhost install-app hrms
          bench use dev.localhost
          echo '>>> Initialization complete!'
        fi

        # Sync BEI custom API files on every start
        if [ -d /bei-api ]; then
          echo '>>> Syncing BEI custom API files...'
          cp -f /bei-api/*.py apps/hrms/hrms/api/ 2>/dev/null || true
          # Update __init__.py to include BEI APIs
          if [ -f /bei-api/__init__.py ]; then
            cp -f /bei-api/__init__.py apps/hrms/hrms/api/__init__.py
          fi
        fi

        # Sync BEI custom utils (brain_sync, bio_id_validation, etc.)
        if [ -d /bei-utils ]; then
          echo '>>> Syncing BEI custom utils...'
          cp -f /bei-utils/*.py apps/hrms/hrms/utils/ 2>/dev/null || true
        fi

        # Sync BEI hooks.py (overrides upstream hooks with BEI brain_sync registrations)
        if [ -f /bei-hooks/hooks.py ]; then
          echo '>>> Syncing BEI hooks.py...'
          cp -f /bei-hooks/hooks.py apps/hrms/hrms/hooks.py
        fi

        # BEI Brain: Set Supabase config for brain_sync hooks
        if [ -n \"$BRAIN_SUPABASE_URL\" ]; then
          echo '>>> Setting BEI Brain Supabase config...'
          bench --site dev.localhost set-config brain_supabase_url \"$BRAIN_SUPABASE_URL\" 2>/dev/null || true
          bench --site dev.localhost set-config brain_supabase_service_key \"$BRAIN_SUPABASE_SERVICE_KEY\" 2>/dev/null || true
        fi

        echo '>>> Starting bench...'
        bench start
      "
    environment:
      - SHELL=/bin/bash
      - BRAIN_SUPABASE_URL=${BRAIN_SUPABASE_URL:-}
      - BRAIN_SUPABASE_SERVICE_KEY=${BRAIN_SUPABASE_SERVICE_KEY:-}
    volumes:
      # Persist bench directory (speeds up subsequent starts)
      - frappe-bench:/home/frappe/frappe-bench
      # Mount BEI custom API files (synced on container start)
      - ../hrms/api:/bei-api:cached
      # Mount BEI custom utils (brain_sync, etc.)
      - ../hrms/utils:/bei-utils:cached
      # Mount BEI hooks.py (for brain_sync doc_events registration)
      - ../hrms:/bei-hooks:cached
    ports:
      - "8000:8000"
      - "9000:9000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - frappe-dev-network
    tty: true

  mariadb:
    container_name: mariadb-dev
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - frappe-dev-network

  redis-cache:
    container_name: redis-cache-dev
    image: redis:alpine
    networks:
      - frappe-dev-network

  redis-queue:
    container_name: redis-queue-dev
    image: redis:alpine
    networks:
      - frappe-dev-network

volumes:
  frappe-bench:
  mariadb-data:

networks:
  frappe-dev-network:
    driver: bridge
