# Blip AI Assistant - Nginx Configuration
# Add to /etc/nginx/sites-available/ and symlink to sites-enabled

# Blip webhook endpoints
# These are added to the existing hq.bebang.ph server block

# Google Chat webhook
location /webhook/gchat {
    proxy_pass http://172.17.0.1:8766/webhook/gchat;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Longer timeout for AI processing
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
}

# Telegram webhook (future)
location /webhook/telegram {
    proxy_pass http://172.17.0.1:8766/webhook/telegram;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# WhatsApp webhook (future)
location /webhook/whatsapp {
    proxy_pass http://172.17.0.1:8766/webhook/whatsapp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# Blip API endpoints (for internal/admin use)
location /blip/ {
    proxy_pass http://172.17.0.1:8766/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# Blip health check
location /blip/health {
    proxy_pass http://172.17.0.1:8766/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
