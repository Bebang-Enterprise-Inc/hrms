# Nginx config for Sheets Receiver webhook
# Add this to your existing hq.bebang.ph server block
# Or include via: include /etc/nginx/conf.d/sheets-receiver.conf;

# Webhook endpoint for Google Drive notifications
location /sheets-webhook {
    proxy_pass http://127.0.0.1:8765/webhook/sheets;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pass Google headers
    proxy_set_header X-Goog-Channel-ID $http_x_goog_channel_id;
    proxy_set_header X-Goog-Resource-ID $http_x_goog_resource_id;
    proxy_set_header X-Goog-Resource-State $http_x_goog_resource_state;
    proxy_set_header X-Goog-Changed $http_x_goog_changed;
    proxy_set_header X-Goog-Message-Number $http_x_goog_message_number;

    # Quick timeout - Google expects fast response
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
}

# Status/management endpoints (optional - can restrict to internal)
location /sheets-api/ {
    # Restrict to internal IPs if desired
    # allow 10.0.0.0/8;
    # deny all;

    proxy_pass http://127.0.0.1:8765/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
