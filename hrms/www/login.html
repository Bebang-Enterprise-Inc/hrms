<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BEI HQ</title>
    <link rel="icon" type="image/x-icon" href="/assets/hrms/images/favicon.ico">

    <!-- Preconnect to Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section img {
            max-width: 120px;
            max-height: 80px;
            margin-bottom: 20px;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .logo-section p {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a4a4a;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .forgot-password {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            color: #333;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .btn-google:hover {
            background: #f8f9fa;
            border-color: #4285f4;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0 20px;
            color: #888;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 16px;
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #666;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-card {
                padding: 30px 24px;
                border-radius: 12px;
            }

            .logo-section h1 {
                font-size: 20px;
            }

            .form-group input {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="/assets/hrms/images/frappe-hr-logo.svg" alt="Frappe HR Logo">
                <h1>Login to BEI HQ</h1>
                <p>Human Resources & ERP</p>
            </div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="usr" placeholder="jane@bebang.ph" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="pwd" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <div class="forgot-password">
                    <a href="/update-password?forgot=1">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span id="login-text">Login</span>
                    <div class="spinner" id="login-spinner" style="display: none;"></div>
                </button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <button type="button" class="btn btn-google" id="google-btn" onclick="loginWithGoogle()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>

            <div class="footer-links">
                <a href="https://bebang.ph" target="_blank">Bebang Enterprise Inc.</a>
            </div>
        </div>
    </div>

    <script>
        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginSpinner = document.getElementById('login-spinner');
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');

            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Show loading
            loginBtn.disabled = true;
            loginText.textContent = 'Logging in...';
            loginSpinner.style.display = 'block';

            try {
                const response = await fetch('/api/method/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        usr: email,
                        pwd: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.message === 'Logged In') {
                    successMsg.textContent = 'Login successful! Redirecting...';
                    successMsg.classList.add('show');

                    // Redirect to app
                    setTimeout(() => {
                        window.location.href = '/app/home';
                    }, 500);
                } else {
                    throw new Error(data.message || data.exc || 'Invalid credentials');
                }
            } catch (error) {
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorMsg.classList.add('show');

                // Reset button
                loginBtn.disabled = false;
                loginText.textContent = 'Login';
                loginSpinner.style.display = 'none';
            }
        });

        // Google OAuth login
        function loginWithGoogle() {
            // Redirect to Frappe's Google OAuth endpoint
            window.location.href = '/api/method/frappe.integrations.oauth2_logins.login_via_google';
        }

        // Check if already logged in
        (async function checkSession() {
            try {
                const response = await fetch('/api/method/frappe.auth.get_logged_user');
                const data = await response.json();

                if (data.message && data.message !== 'Guest') {
                    // Already logged in, redirect
                    window.location.href = '/app/home';
                }
            } catch (e) {
                // Not logged in, stay on login page
            }
        })();

        // Handle OAuth error from URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorMsg = document.getElementById('error-message');
            const errorCode = urlParams.get('error');

            const errorMessages = {
                'google_oauth_unavailable': 'Google login is not available. Please use email/password.',
                'google_oauth_failed': 'Google login failed. Please try again.',
                'access_denied': 'Access denied. Please contact your administrator.'
            };

            errorMsg.textContent = errorMessages[errorCode] || 'Login failed. Please try again.';
            errorMsg.classList.add('show');
        }
    </script>
</body>
</html>
